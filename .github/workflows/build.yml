name: Build Executables

on:
  push:
    branches: [main]
    paths:
      - 'mep_oracle_launcher.py'
      - 'mep_oracle_launcher.spec'
      - 'gather_oracle.sh'
      - 'tests/**'
      - '.github/workflows/build.yml'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pytest

      - name: Run tests
        run: |
          if (Test-Path tests/) { python -m pytest tests/ -v } else { Write-Host "No tests directory found, skipping" }

      - name: Build EXE
        run: pyinstaller mep_oracle_launcher.spec

      - name: Commit EXE to repo
        run: |
          copy dist\MEP_Oracle_Gatherer.exe MEP_Oracle_Gatherer.exe
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MEP_Oracle_Gatherer.exe
          git diff --cached --quiet || git commit -m "Build MEP_Oracle_Gatherer.exe [skip ci]"
          git push origin main

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MEP_Oracle_Gatherer-windows
          path: dist/MEP_Oracle_Gatherer.exe
          retention-days: 90

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pytest

      - name: Run tests
        run: |
          if [ -d tests/ ]; then python -m pytest tests/ -v; else echo "No tests directory found, skipping"; fi

      - name: Build binary
        run: pyinstaller mep_oracle_launcher.spec

      - name: Commit binary to repo
        run: |
          cp dist/MEP_Oracle_Gatherer MEP_Oracle_Gatherer-linux
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MEP_Oracle_Gatherer-linux
          git diff --cached --quiet || git commit -m "Build MEP_Oracle_Gatherer-linux [skip ci]"
          git push origin main

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MEP_Oracle_Gatherer-linux
          path: dist/MEP_Oracle_Gatherer
          retention-days: 90

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MEP_Oracle_Gatherer-windows
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: MEP_Oracle_Gatherer-linux
          path: artifacts/linux

      - name: Checkout code (for gather_oracle.sh)
        uses: actions/checkout@v4

      - name: Rename artifacts for release
        run: |
          mv artifacts/windows/MEP_Oracle_Gatherer.exe artifacts/MEP_Oracle_Gatherer-windows.exe
          mv artifacts/linux/MEP_Oracle_Gatherer artifacts/MEP_Oracle_Gatherer-linux
          chmod +x artifacts/MEP_Oracle_Gatherer-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/MEP_Oracle_Gatherer-windows.exe
            artifacts/MEP_Oracle_Gatherer-linux
            gather_oracle.sh
            MEP_Oracle_Gatherer.bat
          generate_release_notes: true
